<section id="dashboard" class="section active">
  <div class="section-title"><div class="section-icon text-icon">DB</div><h3>แดชบอร์ด</h3></div>
  <div class="row g-3" id="dashCards"><div class="col-12"><div class="dashboard-idle-box"><div><b>แดชบอร์ดพร้อมใช้งาน</b><br><span>เพื่อความเร็ว ระบบจะโหลดตัวเลขภาพรวมเมื่อกดปุ่มเท่านั้น</span></div><button class="btn btn-primary" onclick="loadDashboard({silentLoading:false,force:true})">โหลดภาพรวม</button></div></div></div>
  <div class="card p-3 mt-3"><h5><span class="mini-status-dot"></span> คาบที่กำลังเปิด</h5><div id="activeSessions"></div></div>
</section>
<section id="setup" class="section">
  <div class="section-title"><div class="section-icon text-icon">SET</div><h3>ตั้งค่าระบบ</h3></div>
  <div class="card p-3 mb-3">
    <div class="alert alert-warning mb-3">เพื่อความปลอดภัย ระบบเวอร์ชันนี้ไม่ฝัง Spreadsheet ID ในโค้ด ให้ตั้งค่าผ่าน Properties/SystemConfig เท่านั้น</div>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Source Form Response Spreadsheet ID</label><input id="setupSourceId" class="form-control" placeholder="ใส่เฉพาะ ID ของชีตคำตอบ Google Form"></div>
      <div class="col-md-3"><label class="form-label">ชื่อชีตคำตอบ</label><input id="setupSourceSheet" class="form-control" value="Form Responses 1"></div>
      <div class="col-md-3 d-flex align-items-end"><button class="btn btn-primary w-100" onclick="initializeSystemUI()">Initialize / Repair</button></div>
      <div class="col-md-3"><button class="btn btn-outline-primary w-100" onclick="detectHeadersUI()">Detect Form Headers</button></div>
      <div class="col-md-3"><button class="btn btn-outline-secondary w-100" onclick="installTriggerUI()">ติดตั้ง Sync Trigger 5 นาที</button></div>
      <div class="col-md-3"><button class="btn btn-success w-100" onclick="autoRepairUI()">ซ่อมอัตโนมัติ</button></div>
    </div>
  </div>
  <div class="card p-3"><pre id="setupResult" class="mb-0"></pre></div>
</section>
<script>
async function loadDashboard(options){options=options||{};return runUiAction('loadDashboard',async()=>{const cards=document.getElementById('dashCards');const activeBox=document.getElementById('activeSessions');if(cards){cards.dataset.loaded='1';cards.innerHTML='<div class="col-12"><div class="soft-info-box">กำลังโหลดข้อมูลภาพรวมแบบเบา ระบบส่วนอื่นสามารถใช้งานได้ตามปกติ</div></div>';}let r=null;try{r=await call('api_getDashboardData',{silentLoading:options.silentLoading!==false,silentError:!!options.silentError,timeoutMs:8000});}catch(e){if(cards)cards.innerHTML='<div class="col-12"><div class="alert alert-warning mb-0"><b>แดชบอร์ดใช้เวลานานกว่าปกติ</b><br>ระบบเปิดให้ใช้งานเมนูอื่นได้ตามปกติ กดปุ่มด้านล่างเพื่อลองโหลดภาพรวมอีกครั้ง<br><button class="btn btn-sm btn-outline-primary mt-2" onclick="loadDashboard({silentLoading:false})">โหลดแดชบอร์ดใหม่</button></div></div>';if(activeBox)activeBox.innerHTML='<div class="text-muted">ยังไม่ได้โหลดข้อมูลคาบที่เปิดอยู่</div>';return;}const d=r.data||{};if(d.offerings&&d.offerings.length){state.offerings=d.offerings;fillOfferingSelects();}if(cards)cards.innerHTML=[['CL','คาบทั้งหมด',d.totalSessions,'badge-soft'],['HW','งานส่ง',d.submissions,'badge-soft-green'],['RV','ดัชนีตรวจงาน',d.pendingReview,'badge-soft-orange'],['NO','ยกเลิก',d.voided,'text-bg-danger'],['IN','เข้าเรียนวันนี้',d.attendanceToday,'badge-soft']].map(x=>`<div class="col-md"><div class="card stat-card p-3"><div class="d-flex justify-content-between align-items-start"><div><div class="small-muted">${x[1]}</div><div class="stat">${x[2]||0}</div></div><span class="badge ${x[3]} fs-6 icon-text-badge">${x[0]}</span></div></div></div>`).join('');if(activeBox)activeBox.innerHTML=(d.activeSessions||[]).map(s=>`<div class="border rounded p-2 mb-2"><b>${escapeHtml(s.class_code)}</b> ${escapeHtml(s.session_date)} คาบ ${escapeHtml(s.period_no)} ${escapeHtml(s.lesson_title||'')} <button class="btn btn-sm btn-outline-danger float-end" onclick="closeSessionUI('${escapeAttr(s.session_id)}')">ปิดคาบ</button></div>`).join('')||'<div class="text-muted">ยังไม่มีคาบที่เปิดอยู่</div>';});}
async function initializeSystemUI(){return runUiAction('initializeSystemUI',async()=>{const sourceSpreadsheetId=document.getElementById('setupSourceId').value.trim();const sourceSheetName=document.getElementById('setupSourceSheet').value.trim()||'Form Responses 1';const payload={};if(sourceSpreadsheetId)payload.sourceSpreadsheetId=sourceSpreadsheetId;if(sourceSheetName)payload.sourceSheetName=sourceSheetName;const r=await call('api_initializeSystem',payload);document.getElementById('setupResult').textContent=pretty(r.data);toast('Initialize/Repair สำเร็จ');await bootstrap();});}
async function detectHeadersUI(){return runUiAction('detectHeadersUI',async()=>{const r=await call('api_detectFormHeaders');document.getElementById('setupResult').textContent=pretty(r.data);toast('ตรวจจับหัวตารางแล้ว');});}
async function installTriggerUI(){return runUiAction('installTriggerUI',async()=>{const r=await call('api_installSyncTrigger',5);document.getElementById('setupResult').textContent=pretty(r.data);toast('ติดตั้ง Trigger แล้ว');});}
async function autoRepairUI(){return runUiAction('autoRepairUI',async()=>{const r=await call('api_autoRepairSystem',{});const target=document.getElementById('setupResult')||document.getElementById('syncResult');if(target)target.textContent=pretty(r.data);toast('ซ่อมอัตโนมัติสำเร็จ');});}
</script>
