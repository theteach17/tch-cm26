<section id="grouping" class="section">
  <div class="section-title"><div class="section-icon">👥</div><h3>จับกลุ่มนักเรียน</h3></div>
  <div class="card glass-card p-3 p-md-4 mb-3 grouping-control-card">
    <div class="row g-3 align-items-end">
      <div class="col-lg-3"><label class="form-label">🏫 ห้อง/รายวิชา</label><select id="groupOffering" class="form-select" onchange="loadGroupSessionsUI();loadGroupingHistoryUI();"></select></div>
      <div class="col-lg-3"><label class="form-label">📌 คาบเรียน</label><select id="groupSession" class="form-select"><option value="">ไม่เลือกคาบ</option></select></div>
      <div class="col-lg-3"><label class="form-label">แหล่งรายชื่อ</label><select id="groupPoolMode" class="form-select"><option value="ALL">รายชื่อทั้งห้อง</option><option value="PRESENT">เฉพาะคนที่มาในคาบนั้น</option></select></div>
      <div class="col-lg-3"><button class="btn btn-success w-100 big-action-btn" onclick="groupStudentsUI()"><span class="btn-symbol">👥</span> จัดกลุ่ม</button></div>
    </div>
    <div class="row g-3 align-items-end mt-1">
      <div class="col-lg-3"><label class="form-label">จำนวนนักเรียนต่อกลุ่ม</label><input id="studentsPerGroup" type="number" min="1" class="form-control" value="4"></div>
      <div class="col-lg-3"><label class="form-label">หรือระบุจำนวนกลุ่ม</label><input id="groupCount" type="number" min="0" class="form-control" placeholder="เว้นว่างได้"></div>
      <div class="col-lg-6"><div class="professional-note mb-0">เมื่อกดจัดกลุ่ม ระบบจะบันทึกผลลงชีท <b>GroupingLog</b> อัตโนมัติ เพื่อให้ตรวจสอบย้อนหลังได้ว่า วันใดจัดกี่กลุ่ม และแต่ละกลุ่มมีสมาชิกใครบ้าง</div></div>
    </div>
  </div>
  <div id="groupResult" class="group-board group-board-large mb-3">
    <div class="empty-state big-empty">เลือกห้องและกด “จัดกลุ่ม” เพื่อเริ่มจัดกลุ่มนักเรียน</div>
  </div>
  <div class="card p-3 grouping-history-card">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="mb-0">ประวัติการจับกลุ่มล่าสุด</h5>
      <button class="btn btn-outline-secondary btn-sm" onclick="loadGroupingHistoryUI()">โหลดประวัติ</button>
    </div>
    <div id="groupHistory" class="group-history-list"><div class="text-muted">ยังไม่ได้โหลดประวัติ</div></div>
  </div>
</section>
<script>
function groupPayload_(){return {offering_id:document.getElementById('groupOffering').value,session_id:document.getElementById('groupSession').value,pool_mode:document.getElementById('groupPoolMode').value};}
async function loadGroupSessionsUI(){return runUiAction('loadGroupSessionsUI',async()=>{const offeringId=document.getElementById('groupOffering').value;const el=document.getElementById('groupSession');if(!el)return;el.innerHTML='<option value="">กำลังโหลดคาบ...</option>';if(!offeringId){el.innerHTML='<option value="">ไม่เลือกคาบ</option>';return;}const r=await call('api_listToolSessions',{offering_id:offeringId,limit:40},{silentLoading:true,timeoutMs:12000});const rows=(r.data&&r.data.sessions)||[];el.innerHTML='<option value="">ไม่เลือกคาบ / ใช้รายชื่อทั้งห้อง</option>'+rows.map(s=>`<option value="${escapeAttr(s.session_id)}">${escapeHtml(s.class_code)} · ${escapeHtml(formatThaiDateDisplay(s.session_date)||s.session_date)} · คาบ ${escapeHtml(s.period_no||'-')} · ${escapeHtml(s.lesson_title||'')} · ${escapeHtml(s.status||'')}</option>`).join('');});}
async function groupStudentsUI(){return runUiAction('groupStudentsUI',async()=>{const payload=Object.assign(groupPayload_(),{students_per_group:document.getElementById('studentsPerGroup').value,group_count:document.getElementById('groupCount').value});if(!payload.offering_id){toast('กรุณาเลือกห้อง/รายวิชาก่อนจัดกลุ่ม','warning');return;}const box=document.getElementById('groupResult');box.innerHTML='<div class="group-loading"><div class="spinner-border text-primary"></div><div class="mt-2 fw-semibold">กำลังจัดกลุ่มอย่างเป็นธรรม...</div></div>';const r=await call('api_groupStudents',payload,{silentLoading:true,timeoutMs:22000});const d=r.data||{};box.innerHTML=`${d.fallback_reason?`<div class="alert alert-warning py-2">${escapeHtml(d.fallback_reason)}</div>`:''}<div class="group-summary-strip"><div><b>รหัสการจับกลุ่ม:</b> ${escapeHtml(d.grouping_id||'-')}</div><div>ใช้รายชื่อ ${d.applied_mode==='PRESENT'?'เฉพาะผู้มาเรียน':'ทั้งห้อง'} · ${d.pool_count||0} คน · จัดได้ ${d.group_count||0} กลุ่ม</div></div><div class="group-grid group-grid-large">${(d.groups||[]).map(g=>`<div class="group-card group-card-large"><div class="group-title"><span class="group-title-main">กลุ่ม ${g.group_no}</span><span>${g.members.length} คน</span></div>${g.members.map((m,idx)=>`<div class="group-member"><div class="member-avatar">${idx+1}</div><div><b>${escapeHtml(m.name)}</b><small>${escapeHtml(m.student_id)} · เลขที่ ${escapeHtml(m.student_no||'-')}</small></div></div>`).join('')}</div>`).join('')}</div>${(d.ungrouped||[]).length?`<div class="ungrouped-box mt-3"><b>รายชื่อที่ยังไม่ถูกจัดกลุ่ม</b><br>${d.ungrouped.map(s=>escapeHtml(s.name)+' ('+escapeHtml(s.student_id)+')').join(', ')}</div>`:''}`;await loadGroupingHistoryUI();});}
async function loadGroupingHistoryUI(){return runUiAction('loadGroupingHistoryUI',async()=>{const offeringId=document.getElementById('groupOffering')?document.getElementById('groupOffering').value:'';const box=document.getElementById('groupHistory');if(!box)return;if(!offeringId){box.innerHTML='<div class="text-muted">เลือกห้อง/รายวิชาเพื่อดูประวัติ</div>';return;}const r=await call('api_listGroupingHistory',{offering_id:offeringId,limit:24},{silentLoading:true,timeoutMs:12000});const rows=(r.data&&r.data.rows)||[];if(!rows.length){box.innerHTML='<div class="text-muted">ยังไม่มีประวัติการจับกลุ่มของห้องนี้</div>';return;}box.innerHTML=rows.map(row=>`<div class="history-item"><div><b>${escapeHtml(row.group_no==='UNGROUPED'?'รายชื่อคงเหลือ':'กลุ่ม '+row.group_no)}</b><small>${escapeHtml(row.group_date||row.created_at||'')} · ${escapeHtml(row.member_count||0)} คน · ${escapeHtml(row.grouping_id||'')}</small></div><div class="history-members">${safeNamesFromJson_(row.member_names_json)}</div></div>`).join('');});}
function safeNamesFromJson_(json){try{const arr=JSON.parse(json||'[]');return arr.map(escapeHtml).join(', ');}catch(e){return escapeHtml(json||'');}}
</script>
