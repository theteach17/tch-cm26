/* v1.9 review viewer/date UX enhancements */
.date-display-box{
  border:1px solid #dbe7ff;
  background:linear-gradient(135deg,#eff6ff,#ffffff);
  border-radius:16px;
  padding:12px 14px;
  font-weight:800;
  color:#174ea6;
  min-height:46px;
  display:flex;
  align-items:center;
  box-shadow:inset 0 0 0 1px rgba(37,99,235,.05);
}
.review-info-box{
  background:#f8fbff;
  border:1px dashed #b8cef8;
  border-radius:14px;
  padding:10px 12px;
  color:#355075;
  font-weight:500;
}
.review-workspace{
  border-radius:26px;
  overflow:hidden;
}
.review-photo-stage{
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  min-height:620px;
  max-height:calc(100vh - 260px);
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:auto;
  position:relative;
  padding:18px;
  border:1px solid rgba(255,255,255,.1);
}
.review-photo-stage img{
  max-width:100%;
  max-height:calc(100vh - 310px);
  object-fit:contain;
  border-radius:16px;
  box-shadow:0 22px 55px rgba(0,0,0,.35);
  background:#fff;
  transform-origin:center center;
  transition:transform .15s ease;
}
.review-photo-placeholder{
  color:#fff;
  text-align:center;
  padding:32px;
  border:1px dashed rgba(255,255,255,.35);
  border-radius:20px;
  max-width:560px;
}
.review-side-panel{
  background:#fff;
  border-radius:24px;
  box-shadow:0 14px 35px rgba(15,23,42,.08);
  height:100%;
}
.review-student-name{font-size:1.35rem;font-weight:800;color:#172033;line-height:1.25}
.review-meta-pill{display:inline-flex;align-items:center;gap:6px;background:#f1f5ff;border:1px solid #dbe7ff;color:#174ea6;border-radius:999px;padding:.35rem .65rem;font-weight:700;font-size:.86rem}

.review-nav-btn{min-width:112px}
