<section id="review" class="section">
  <div class="section-title"><div class="section-icon">🖼️</div><h3>ตรวจงานจากรูปภาพ</h3></div>

  <div class="card glass-card p-3 mb-3 review-toolbar">
    <div class="row g-3 align-items-end">
      <div class="col-lg-3 col-md-6">
        <label class="form-label">🏫 ห้องเรียน</label>
        <select id="reviewClass" class="form-select" onchange="onReviewClassChangeUI()"></select>
      </div>
      <div class="col-lg-4 col-md-6">
        <label class="form-label">📝 หัวข้องานที่จะตรวจ</label>
        <select id="reviewTopic" class="form-select" onchange="onReviewTopicChangeUI()">
          <option value="">— เลือกหัวข้อก่อนโหลดงาน —</option>
        </select>
      </div>
      <div class="col-lg-2 col-md-6">
        <label class="form-label">🔎 สถานะ</label>
        <select id="reviewStatus" class="form-select">
          <option value="">ทุกสถานะ</option>
          <option>PENDING</option><option>APPROVED</option><option>NO_STAMP</option><option>WRONG_TOPIC</option><option>DUPLICATE</option><option>UNCLEAR</option>
        </select>
      </div>
      <div class="col-lg-3 col-md-6 d-flex gap-2">
        <button class="btn btn-primary flex-fill" onclick="loadReviewUI(true,false)">โหลดรายการ</button>
        <button class="btn btn-outline-success" onclick="rebuildReviewIndexUI()" title="สร้างดัชนีใหม่เฉพาะหัวข้อที่เลือก">รีเฟรชดัชนี</button>
      </div>
      <div class="col-12">
        <div id="reviewInfo" class="review-info-box">เลือกห้องและหัวข้องานก่อน ระบบจะแสดงงานทีละรายการพร้อมรูปภาพขนาดใหญ่สำหรับตรวจละเอียด</div>
      </div>
    </div>
  </div>

  <div id="reviewViewer"></div>
  <div id="reviewQueue" class="review-queue-strip mt-3"></div>
  <div class="text-center my-3"><button id="reviewMoreBtn" class="btn btn-outline-primary d-none" onclick="loadMoreReviewUI()">โหลดเพิ่ม</button></div>
</section>

<script>
async function onReviewClassChangeUI(){return runUiAction('onReviewClassChangeUI',async()=>{resetReviewState_();document.getElementById('reviewInfo').textContent='กำลังโหลดหัวข้องานของห้องที่เลือก...';await loadReviewTopicsUI();});}
async function onReviewTopicChangeUI(){resetReviewState_();const topic=document.getElementById('reviewTopic').value;document.getElementById('reviewInfo').textContent=topic?'พร้อมโหลดรายการตรวจของหัวข้อที่เลือก':'กรุณาเลือกหัวข้องานก่อนโหลดรายการ';}
function resetReviewState_(){state.review.offset=0;state.review.rows=[];state.review.hasMore=false;state.review.currentIndex=0;state.review.currentFileIndex=0;state.review.zoom=1;renderReviewWorkspace();}
async function loadReviewTopicsUI(){return runUiAction('loadReviewTopicsUI',async()=>{const classCode=document.getElementById('reviewClass').value;if(!classCode){document.getElementById('reviewTopic').innerHTML='<option value="">— เลือกห้องก่อน —</option>';return;}const r=await call('api_listReviewTopics',{class_code:classCode},{silentLoading:true});const topics=(r.data&&r.data.topics)||[];const opts=topics.map(t=>`<option value="${escapeAttr(t.topic_id)}" data-topic-text="${escapeAttr(t.form_topic_text)}">${escapeHtml(t.label||t.display_topic_name||t.form_topic_text)}${t.indexed_count?` · ${t.indexed_count} รายการ`:''}</option>`).join('');document.getElementById('reviewTopic').innerHTML=opts?'<option value="">— เลือกหัวข้องาน —</option>'+opts:'<option value="">ยังไม่พบหัวข้อของห้องนี้</option>';document.getElementById('reviewInfo').textContent=topics.length?`พบหัวข้อ ${topics.length} หัวข้อ กรุณาเลือกหัวข้อที่จะตรวจ`:'ยังไม่พบ TopicMap ของห้องนี้ ให้ไปเมนู “หัวข้องาน/ย้อนหลัง” หรือ sync/ซ่อมอัตโนมัติก่อน';});}
function selectedReviewTopicText(){const sel=document.getElementById('reviewTopic');const opt=sel&&sel.options[sel.selectedIndex];return opt?opt.getAttribute('data-topic-text')||'':'';}
async function rebuildReviewIndexUI(){return runUiAction('rebuildReviewIndexUI',async()=>{const classCode=document.getElementById('reviewClass').value;const topicId=document.getElementById('reviewTopic').value;if(!classCode||!topicId){toast('กรุณาเลือกห้องและหัวข้องานก่อนรีเฟรชดัชนี','warning');return;}document.getElementById('reviewInfo').textContent='กำลังสร้างดัชนีเฉพาะหัวข้อนี้...';const r=await call('api_rebuildReviewIndex',{class_code:classCode,topic_id:topicId});toast(`สร้างดัชนีแล้ว ${r.data.rebuilt||0} รายการ`);await loadReviewUI(true,false);});}
async function loadReviewUI(reset,forceRebuild){return runUiAction('loadReviewUI',async()=>{const classCode=document.getElementById('reviewClass').value;const topicId=document.getElementById('reviewTopic').value;if(!classCode){toast('กรุณาเลือกห้องเรียนก่อน','warning');return;}if(!topicId){toast('กรุณาเลือกหัวข้องานก่อน ระบบจะไม่โหลดทั้งห้องเพื่อป้องกันความล่าช้า','warning');return;}if(reset){state.review.offset=0;state.review.rows=[];state.review.currentIndex=0;state.review.currentFileIndex=0;state.review.zoom=1;}const payload={class_code:classCode,topic_id:topicId,review_status:document.getElementById('reviewStatus').value,limit:state.review.limit||30,offset:state.review.offset||0,force_rebuild:!!forceRebuild};document.getElementById('reviewInfo').textContent='กำลังโหลดเฉพาะหัวข้อที่เลือก...';const r=await call('api_listSubmissionsForReview',payload);const d=r.data||{rows:[]};const incoming=d.rows||[];state.review.rows=reset?incoming:(state.review.rows||[]).concat(incoming);state.review.offset=(d.offset||0)+incoming.length;state.review.hasMore=!!d.hasMore;if(state.review.currentIndex>=state.review.rows.length)state.review.currentIndex=Math.max(0,state.review.rows.length-1);state.review.currentFileIndex=0;state.review.zoom=1;renderReviewWorkspace();document.getElementById('reviewInfo').textContent=d.requiresTopic?'กรุณาเลือกหัวข้องานก่อนโหลดรายการ':`หัวข้อ: ${selectedReviewTopicText()} · แสดง ${state.review.rows.length}/${d.total||0} รายการ · ตรวจทีละรายการ`;document.getElementById('reviewMoreBtn').classList.toggle('d-none',!state.review.hasMore);});}
function loadMoreReviewUI(){return loadReviewUI(false,false);}

function currentReviewRow_(){const rows=state.review.rows||[];if(!rows.length)return null;state.review.currentIndex=Math.max(0,Math.min(state.review.currentIndex||0,rows.length-1));return rows[state.review.currentIndex];}
function currentReviewFile_(){const row=currentReviewRow_();const files=(row&&row.files)||[];if(!files.length)return null;state.review.currentFileIndex=Math.max(0,Math.min(state.review.currentFileIndex||0,files.length-1));return files[state.review.currentFileIndex];}
function reviewProgressPercent_(){const rows=state.review.rows||[];if(!rows.length)return 0;return Math.round(((state.review.currentIndex+1)/rows.length)*100);}
function statusBadgeClass_(v){v=String(v||'');if(v==='APPROVED')return 'text-bg-success';if(v==='PENDING')return 'text-bg-info';if(v==='ACTIVE')return 'text-bg-secondary';if(v==='VOIDED'||v.indexOf('NO_')===0||v.indexOf('WRONG')===0)return 'text-bg-danger';return 'text-bg-warning';}
function renderReviewWorkspace(){const viewer=document.getElementById('reviewViewer');const q=document.getElementById('reviewQueue');if(!viewer)return;const rows=state.review.rows||[];if(!rows.length){viewer.innerHTML='<div class="alert alert-info">ยังไม่มีรายการให้แสดง กรุณาเลือกห้องและหัวข้อ แล้วกดโหลดรายการ</div>';if(q)q.innerHTML='';return;}const sub=currentReviewRow_();const file=currentReviewFile_();const files=sub.files||[];const progress=reviewProgressPercent_();const imgHtml=file&&file.preview_url?`<img id="reviewMainImage" src="${escapeAttr(file.preview_url)}" data-view-url="${escapeAttr(file.file_url||file.original_url||'')}" data-original-url="${escapeAttr(file.original_url||'')}" style="transform:scale(${state.review.zoom||1})" onerror="handleReviewImageError(this)">`:`<div class="review-photo-placeholder"><div class="display-5 mb-2">🖼️</div><b>ไม่พบรูปภาพสำหรับรายการนี้</b><br><span class="text-white-50">อาจเกิดจากสิทธิ์ไฟล์ Drive หรือข้อมูลไฟล์ยังไม่ถูกสร้างในดัชนี</span>${file&&file.file_url?`<div class="mt-3"><a class="btn btn-light" target="_blank" href="${escapeAttr(file.file_url)}">เปิดไฟล์ต้นฉบับ</a></div>`:''}</div>`;
viewer.innerHTML=`
  <div class="card glass-card p-3 review-workspace">
    <div class="d-flex justify-content-between align-items-center gap-2 mb-3 flex-wrap">
      <div>
        <div class="fw-bold text-primary">รายการที่ ${state.review.currentIndex+1} จาก ${rows.length}</div>
        <div class="review-top-progress mt-1"><span style="width:${progress}%"></span></div>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-outline-primary review-nav-btn" onclick="prevReviewItem()">← ก่อนหน้า</button>
        <button class="btn btn-outline-primary review-nav-btn" onclick="nextReviewItem()">ถัดไป →</button>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-xl-8">
        <div class="review-photo-stage" id="reviewPhotoStage">${imgHtml}</div>
        <div class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2">
          <div class="btn-group">
            <button class="btn btn-outline-secondary btn-sm" onclick="zoomReview(-0.15)">🔍−</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="resetReviewZoom()">พอดีจอ</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="zoomReview(0.15)">🔍+</button>
          </div>
          <div class="btn-group">
            <button class="btn btn-outline-primary btn-sm" onclick="openCurrentReviewImage()">เปิดรูปในแท็บใหม่</button>
          </div>
        </div>
        <div class="review-file-thumbs mt-2">${files.map((f,i)=>`<img loading="lazy" class="review-file-thumb ${i===(state.review.currentFileIndex||0)?'active':''}" src="${escapeAttr(f.preview_url||'')}" onerror="this.style.opacity=.25" onclick="setReviewFile(${i})" title="รูปที่ ${i+1}">`).join('')||'<span class="small-muted">ไม่มีไฟล์แนบ</span>'}</div>
      </div>
      <div class="col-xl-4">
        <div class="review-side-panel p-3">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
              <div class="review-student-name">${escapeHtml(sub.student_name||sub.student_id)}</div>
              <div class="small-muted">เลขประจำตัว: ${escapeHtml(sub.student_id||'-')}</div>
            </div>
            <span class="review-meta-pill">${escapeHtml(sub.class_code||'')}</span>
          </div>
          <hr>
          <div class="small-muted mb-1">หัวข้อ</div>
          <div class="fw-semibold mb-2">${escapeHtml(sub.form_topic_text||'-')}</div>
          <div class="small-muted mb-1">เวลาส่ง</div>
          <div class="fw-semibold mb-2">${escapeHtml(sub.timestamp||'-')}</div>
          <div class="d-flex gap-2 flex-wrap mb-3">
            <span class="badge ${statusBadgeClass_(sub.review_status)}">${escapeHtml(sub.review_status||'-')}</span>
            <span class="badge ${statusBadgeClass_(sub.score_status)}">${escapeHtml(sub.score_status||'-')}</span>
            <span class="badge text-bg-light">${files.length} รูป</span>
          </div>
          <div class="review-action-grid">
            <button class="btn btn-success" onclick="reviewCurrent('APPROVE')">✅ ผ่าน</button>
            <button class="btn btn-danger" onclick="reviewCurrent('VOID_NO_STAMP','ไม่มีตราปั๊ม')">🚫 ไม่มีตรา</button>
            <button class="btn btn-warning" onclick="reviewCurrent('VOID_WRONG_TOPIC','ส่งผิดหัวข้อ')">⚠️ ผิดหัวข้อ</button>
            <button class="btn btn-outline-danger" onclick="reviewCurrent('VOID_UNCLEAR_IMAGE','รูปไม่ชัด')">🔎 รูปไม่ชัด</button>
            <button class="btn btn-outline-secondary" onclick="reviewCurrent('VOID_DUPLICATE','ส่งซ้ำ')">📌 ส่งซ้ำ</button>
            <button class="btn btn-outline-success" onclick="reviewCurrent('RESTORE_SCORE','')">↩️ คืนคะแนน</button>
          </div>
          <div class="alert alert-light border mt-3 mb-0 small">เมื่อกดบันทึกผลตรวจ ระบบจะบันทึกสถานะและเลื่อนไปรายการถัดไปอัตโนมัติ</div>
        </div>
      </div>
    </div>
  </div>`;
if(q){q.innerHTML=rows.map((r,i)=>`<div class="review-queue-item ${i===state.review.currentIndex?'active':''} ${r.review_status==='APPROVED'?'done':''}" onclick="jumpReviewItem(${i})"><b>${escapeHtml(r.student_name||r.student_id)}</b><br><span class="small-muted">${escapeHtml(r.student_id||'')} · ${escapeHtml(r.review_status||'')}</span></div>`).join('');}
}
function handleReviewImageError(img){const view=img.getAttribute('data-view-url');if(view&&!img.dataset.triedView){img.dataset.triedView='1';img.src=view;return;}img.style.display='none';const box=document.createElement('div');box.className='review-photo-placeholder';box.innerHTML='<div class="display-5 mb-2">⚠️</div><b>โหลดรูปไม่สำเร็จ</b><br><span class="text-white-50">ให้ตรวจสอบสิทธิ์ไฟล์ Google Drive หรือเปิดไฟล์ต้นฉบับ</span>'+(view?`<div class="mt-3"><a class="btn btn-light" target="_blank" href="${escapeAttr(view)}">เปิดไฟล์ต้นฉบับ</a></div>`:'');img.parentNode.appendChild(box);}
function setReviewFile(i){state.review.currentFileIndex=i;state.review.zoom=1;renderReviewWorkspace();}
function zoomReview(delta){state.review.zoom=Math.max(.4,Math.min(3,(state.review.zoom||1)+delta));const img=document.getElementById('reviewMainImage');if(img)img.style.transform=`scale(${state.review.zoom})`;}
function resetReviewZoom(){state.review.zoom=1;const img=document.getElementById('reviewMainImage');if(img)img.style.transform='scale(1)';}
function openCurrentReviewImage(){const f=currentReviewFile_();if(!f){toast('ไม่มีไฟล์ให้เปิด','warning');return;}window.open(f.file_url||f.original_url||f.preview_url,'_blank');}
function prevReviewItem(){if(!state.review.rows.length)return;state.review.currentIndex=Math.max(0,(state.review.currentIndex||0)-1);state.review.currentFileIndex=0;state.review.zoom=1;renderReviewWorkspace();}
async function nextReviewItem(){if(!state.review.rows.length)return;if((state.review.currentIndex||0)<state.review.rows.length-1){state.review.currentIndex++;state.review.currentFileIndex=0;state.review.zoom=1;renderReviewWorkspace();return;}if(state.review.hasMore){await loadMoreReviewUI();state.review.currentIndex=Math.min(state.review.currentIndex+1,state.review.rows.length-1);state.review.currentFileIndex=0;state.review.zoom=1;renderReviewWorkspace();}else{toast('ตรวจถึงรายการสุดท้ายแล้ว','info');}}
function jumpReviewItem(i){state.review.currentIndex=i;state.review.currentFileIndex=0;state.review.zoom=1;renderReviewWorkspace();}
async function reviewCurrent(action,reason){return runUiAction('reviewCurrent',async()=>{const sub=currentReviewRow_();if(!sub){toast('ไม่มีรายการตรวจ','warning');return;}if(String(action).indexOf('VOID_')===0){const ok=await confirmAction('ยืนยันยกเลิกคะแนน',`คะแนนของ ${sub.student_name||sub.student_id} จะถูกยกเลิกด้วยเหตุผล: ${reason||action} ยืนยันหรือไม่`);if(!ok)return;}if(action==='RESTORE_SCORE'){const ok=await confirmAction('ยืนยันคืนคะแนน',`คะแนนของ ${sub.student_name||sub.student_id} จะถูกคืนกลับมาเป็นปกติ ยืนยันหรือไม่`);if(!ok)return;}const r=await call('api_reviewSubmission',sub.submission_id,action,reason||'','');const d=(r&&r.data)||{};sub.review_status=d.review_status||sub.review_status;sub.score_status=d.score_status||sub.score_status;toast('บันทึกผลตรวจแล้ว');await nextReviewItem();});}
</script>
