<section id="review" class="section">
  <div class="section-title"><div class="section-icon">🖼️</div><h3>ตรวจงานจากรูปภาพ</h3></div>
  <div class="card glass-card p-3 mb-3 review-toolbar">
    <div class="row g-3 align-items-end">
      <div class="col-lg-3 col-md-6">
        <label class="form-label">🏫 ห้องเรียน</label>
        <select id="reviewClass" class="form-select" onchange="onReviewClassChangeUI()"></select>
      </div>
      <div class="col-lg-4 col-md-6">
        <label class="form-label">📝 หัวข้องานที่จะตรวจ</label>
        <select id="reviewTopic" class="form-select" onchange="onReviewTopicChangeUI()">
          <option value="">— เลือกหัวข้อก่อนโหลดงาน —</option>
        </select>
      </div>
      <div class="col-lg-2 col-md-6">
        <label class="form-label">🔎 สถานะ</label>
        <select id="reviewStatus" class="form-select">
          <option value="">ทุกสถานะ</option>
          <option>PENDING</option><option>APPROVED</option><option>NO_STAMP</option><option>WRONG_TOPIC</option><option>DUPLICATE</option><option>UNCLEAR</option>
        </select>
      </div>
      <div class="col-lg-3 col-md-6 d-flex gap-2">
        <button class="btn btn-primary flex-fill" onclick="loadReviewUI(true)">โหลดรายการ</button>
        <button class="btn btn-outline-success" onclick="rebuildReviewIndexUI()" title="สร้างดัชนีใหม่เฉพาะหัวข้อที่เลือก">รีเฟรชดัชนี</button>
      </div>
      <div class="col-12">
        <div id="reviewInfo" class="review-info-box">เลือกห้องและหัวข้องานก่อน ระบบจะดึงเฉพาะรายการของหัวข้อนั้นเพื่อให้โหลดเร็ว</div>
      </div>
    </div>
  </div>
  <div id="reviewList" class="row g-3"></div>
  <div class="text-center my-3"><button id="reviewMoreBtn" class="btn btn-outline-primary d-none" onclick="loadMoreReviewUI()">โหลดเพิ่ม</button></div>
</section>
<script>
async function onReviewClassChangeUI(){return runUiAction('onReviewClassChangeUI',async()=>{state.review.offset=0;state.review.rows=[];renderReviewList();document.getElementById('reviewInfo').textContent='กำลังโหลดหัวข้องานของห้องที่เลือก...';await loadReviewTopicsUI();});}
async function onReviewTopicChangeUI(){state.review.offset=0;state.review.rows=[];renderReviewList();const topic=document.getElementById('reviewTopic').value;document.getElementById('reviewInfo').textContent=topic?'พร้อมโหลดรายการตรวจของหัวข้อที่เลือก':'กรุณาเลือกหัวข้องานก่อนโหลดรายการ';}
async function loadReviewTopicsUI(){return runUiAction('loadReviewTopicsUI',async()=>{const classCode=document.getElementById('reviewClass').value;if(!classCode){document.getElementById('reviewTopic').innerHTML='<option value="">— เลือกห้องก่อน —</option>';return;}const r=await call('api_listReviewTopics',{class_code:classCode},{silentLoading:true});const topics=(r.data&&r.data.topics)||[];const opts=topics.map(t=>`<option value="${escapeAttr(t.topic_id)}" data-topic-text="${escapeAttr(t.form_topic_text)}">${escapeHtml(t.label||t.display_topic_name||t.form_topic_text)}${t.indexed_count?` · ${t.indexed_count} รายการ`:''}</option>`).join('');document.getElementById('reviewTopic').innerHTML=opts?'<option value="">— เลือกหัวข้องาน —</option>'+opts:'<option value="">ยังไม่พบหัวข้อของห้องนี้</option>';document.getElementById('reviewInfo').textContent=topics.length?`พบหัวข้อ ${topics.length} หัวข้อ กรุณาเลือกหัวข้อที่จะตรวจ`:'ยังไม่พบ TopicMap ของห้องนี้ ให้ไปเมนู “หัวข้องาน/ย้อนหลัง” หรือ sync/ซ่อมอัตโนมัติก่อน';});}
function selectedReviewTopicText(){const sel=document.getElementById('reviewTopic');const opt=sel&&sel.options[sel.selectedIndex];return opt?opt.getAttribute('data-topic-text')||'':'';}
async function rebuildReviewIndexUI(){return runUiAction('rebuildReviewIndexUI',async()=>{const classCode=document.getElementById('reviewClass').value;const topicId=document.getElementById('reviewTopic').value;if(!classCode||!topicId){toast('กรุณาเลือกห้องและหัวข้องานก่อนรีเฟรชดัชนี','warning');return;}document.getElementById('reviewInfo').textContent='กำลังสร้างดัชนีเฉพาะหัวข้อนี้...';const r=await call('api_rebuildReviewIndex',{class_code:classCode,topic_id:topicId});toast(`สร้างดัชนีแล้ว ${r.data.rebuilt||0} รายการ`);await loadReviewUI(true,true);});}
async function loadReviewUI(reset,forceRebuild){return runUiAction('loadReviewUI',async()=>{const classCode=document.getElementById('reviewClass').value;const topicId=document.getElementById('reviewTopic').value;if(!classCode){toast('กรุณาเลือกห้องเรียนก่อน','warning');return;}if(!topicId){toast('กรุณาเลือกหัวข้องานก่อน ระบบจะไม่โหลดทั้งห้องเพื่อป้องกันความล่าช้า','warning');return;}if(reset){state.review.offset=0;state.review.rows=[];}const payload={class_code:classCode,topic_id:topicId,review_status:document.getElementById('reviewStatus').value,limit:state.review.limit||30,offset:state.review.offset||0,force_rebuild:!!forceRebuild};document.getElementById('reviewInfo').textContent='กำลังโหลดเฉพาะหัวข้อที่เลือก...';const r=await call('api_listSubmissionsForReview',payload);const d=r.data||{rows:[]};state.review.rows=reset?d.rows:(state.review.rows||[]).concat(d.rows||[]);state.review.offset=(d.offset||0)+(d.rows||[]).length;state.review.hasMore=!!d.hasMore;renderReviewList();document.getElementById('reviewInfo').textContent=d.requiresTopic?'กรุณาเลือกหัวข้องานก่อนโหลดรายการ':`หัวข้อ: ${selectedReviewTopicText()} · แสดง ${state.review.rows.length}/${d.total||0} รายการ`;document.getElementById('reviewMoreBtn').classList.toggle('d-none',!state.review.hasMore);});}
function loadMoreReviewUI(){return loadReviewUI(false,false);}
function renderReviewList(){const rows=state.review.rows||[];document.getElementById('reviewList').innerHTML=rows.map(sub=>`<div class="col-xl-3 col-lg-4 col-md-6"><div class="card review-card p-3 h-100"><div class="d-flex justify-content-between gap-2"><div><b>${escapeHtml(sub.student_name||sub.student_id)}</b><div class="small-muted">${escapeHtml(sub.student_id||'')}</div></div><span class="badge text-bg-light h-25">${escapeHtml(sub.class_code)}</span></div><div class="small-muted mt-2">${escapeHtml(sub.form_topic_text)}<br>${escapeHtml(sub.timestamp)}</div><div class="review-thumb-grid my-2">${(sub.files||[]).slice(0,3).map(f=>`<a href="${escapeAttr(f.file_url)}" target="_blank"><img loading="lazy" class="img-thumb" src="${escapeAttr(f.preview_url)}" onerror="this.closest('a').style.display='none'"></a>`).join('')}</div><div class="mb-2"><span class="badge text-bg-info">${escapeHtml(sub.review_status)}</span> <span class="badge text-bg-secondary">${escapeHtml(sub.score_status)}</span></div><div class="btn-group flex-wrap"><button class="btn btn-sm btn-success" onclick="review('${escapeAttr(sub.submission_id)}','APPROVE')">ผ่าน</button><button class="btn btn-sm btn-danger" onclick="review('${escapeAttr(sub.submission_id)}','VOID_NO_STAMP','ไม่มีตราปั๊ม','${escapeAttr(sub.student_name||sub.student_id)}')">ไม่มีตรา</button><button class="btn btn-sm btn-warning" onclick="review('${escapeAttr(sub.submission_id)}','VOID_WRONG_TOPIC','ส่งผิดหัวข้อ','${escapeAttr(sub.student_name||sub.student_id)}')">ผิดหัวข้อ</button><button class="btn btn-sm btn-outline-secondary" onclick="review('${escapeAttr(sub.submission_id)}','RESTORE_SCORE','','${escapeAttr(sub.student_name||sub.student_id)}')">คืนคะแนน</button></div></div></div>`).join('')||'<div class="alert alert-info">ยังไม่มีรายการให้แสดง กรุณาเลือกหัวข้อแล้วกดโหลดรายการ</div>';}
async function review(id,action,reason,name){return runUiAction('review',async()=>{if(String(action).indexOf('VOID_')===0){const ok=await confirmAction('ยืนยันยกเลิกคะแนน',`คะแนนของ ${name||id} จะถูกยกเลิกด้วยเหตุผล: ${reason||action} ยืนยันหรือไม่`);if(!ok)return;}if(action==='RESTORE_SCORE'){const ok=await confirmAction('ยืนยันคืนคะแนน',`คะแนนของ ${name||id} จะถูกคืนกลับมาเป็นปกติ ยืนยันหรือไม่`);if(!ok)return;}await call('api_reviewSubmission',id,action,reason,'');toast('บันทึกผลตรวจแล้ว');await loadReviewUI(true,false);});}
</script>
