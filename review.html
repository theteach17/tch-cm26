<section id="review" class="section">
  <h3>ตรวจงานจากรูปภาพ</h3>
  <div class="card p-3 mb-3 review-toolbar">
    <div class="row g-3">
      <div class="col-md-3"><select id="reviewClass" class="form-select"></select></div>
      <div class="col-md-3"><select id="reviewStatus" class="form-select"><option value="">ทุกสถานะ</option><option>PENDING</option><option>APPROVED</option><option>NO_STAMP</option><option>WRONG_TOPIC</option><option>DUPLICATE</option><option>UNCLEAR</option></select></div>
      <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadReviewUI(true)">โหลดรายการ</button></div>
      <div class="col-md-4 small-muted d-flex align-items-center" id="reviewInfo"></div>
    </div>
  </div>
  <div id="reviewList" class="row g-3"></div>
  <div class="text-center my-3"><button id="reviewMoreBtn" class="btn btn-outline-primary d-none" onclick="loadMoreReviewUI()">โหลดเพิ่ม</button></div>
</section>
<script>
async function loadReviewUI(reset){return runUiAction('loadReviewUI',async()=>{if(reset){state.review.offset=0;state.review.rows=[];}const payload={class_code:document.getElementById('reviewClass').value,review_status:document.getElementById('reviewStatus').value,limit:state.review.limit,offset:state.review.offset};const r=await call('api_listSubmissionsForReview',payload);const d=r.data||{rows:[]};state.review.rows=reset?d.rows:(state.review.rows||[]).concat(d.rows||[]);state.review.offset=(d.offset||0)+(d.rows||[]).length;state.review.hasMore=!!d.hasMore;renderReviewList();document.getElementById('reviewInfo').textContent=`แสดง ${state.review.rows.length}/${d.total||0} รายการ`;document.getElementById('reviewMoreBtn').classList.toggle('d-none',!state.review.hasMore);});}
function loadMoreReviewUI(){return loadReviewUI(false);}
function renderReviewList(){const rows=state.review.rows||[];document.getElementById('reviewList').innerHTML=rows.map(sub=>`<div class="col-md-4"><div class="card p-3 h-100"><div><b>${escapeHtml(sub.student_name||sub.student_id)}</b> <span class="badge text-bg-light">${escapeHtml(sub.class_code)}</span></div><div class="small-muted">${escapeHtml(sub.form_topic_text)}<br>${escapeHtml(sub.timestamp)}</div><div class="d-flex gap-2 flex-wrap my-2">${(sub.files||[]).map(f=>`<a href="${escapeAttr(f.file_url)}" target="_blank"><img loading="lazy" class="img-thumb" src="${escapeAttr(f.preview_url)}" onerror="this.style.display='none'"></a>`).join('')}</div><div class="mb-2"><span class="badge text-bg-info">${escapeHtml(sub.review_status)}</span> <span class="badge text-bg-secondary">${escapeHtml(sub.score_status)}</span></div><div class="btn-group flex-wrap"><button class="btn btn-sm btn-success" onclick="review('${escapeAttr(sub.submission_id)}','APPROVE')">ผ่าน</button><button class="btn btn-sm btn-danger" onclick="review('${escapeAttr(sub.submission_id)}','VOID_NO_STAMP','ไม่มีตราปั๊ม','${escapeAttr(sub.student_name||sub.student_id)}')">ไม่มีตรา</button><button class="btn btn-sm btn-warning" onclick="review('${escapeAttr(sub.submission_id)}','VOID_WRONG_TOPIC','ส่งผิดหัวข้อ','${escapeAttr(sub.student_name||sub.student_id)}')">ผิดหัวข้อ</button><button class="btn btn-sm btn-outline-secondary" onclick="review('${escapeAttr(sub.submission_id)}','RESTORE_SCORE','','${escapeAttr(sub.student_name||sub.student_id)}')">คืนคะแนน</button></div></div></div>`).join('')||'<div class="alert alert-info">ไม่พบรายการ</div>';}
async function review(id,action,reason,name){return runUiAction('review',async()=>{if(String(action).indexOf('VOID_')===0){const ok=await confirmAction('ยืนยันยกเลิกคะแนน',`คะแนนของ ${name||id} จะถูกยกเลิกด้วยเหตุผล: ${reason||action} ยืนยันหรือไม่`);if(!ok)return;}if(action==='RESTORE_SCORE'){const ok=await confirmAction('ยืนยันคืนคะแนน',`คะแนนของ ${name||id} จะถูกคืนกลับมาเป็นปกติ ยืนยันหรือไม่`);if(!ok)return;}await call('api_reviewSubmission',id,action,reason,'');toast('บันทึกผลตรวจแล้ว');await loadReviewUI(true);});}
</script>
