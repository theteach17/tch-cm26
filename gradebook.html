<section id="scores" class="section">
  <h3>คะแนนสมุด / คะแนนพิเศษ</h3>
  <div class="card p-3">
    <div class="row g-3">
      <div class="col-md-4"><label>คาบ</label><select id="scoreSession" class="form-select"></select></div>
      <div class="col-md-3"><label>เลขประจำตัว</label><input id="manualStudentId" class="form-control"></div>
      <div class="col-md-3"><label>ชื่อรายการ</label><input id="manualTitle" class="form-control" value="คะแนนพิเศษ"></div>
      <div class="col-md-2"><label>คะแนน</label><input id="manualDelta" type="number" step="0.1" class="form-control" value="1"></div>
    </div>
    <div class="mt-3"><button class="btn btn-outline-info" onclick="randomBookUI()">สุ่มตรวจสมุด 5 คน</button> <button class="btn btn-success" onclick="saveManualScoreUI()">บันทึกคะแนนพิเศษ/หักคะแนน</button></div>
    <div id="scoreResult" class="mt-3"></div>
  </div>
</section>
<section id="gradebook" class="section">
  <h3>สมุดคะแนน</h3>
  <div class="card p-3 mb-3"><div class="row g-3"><div class="col-md-5"><select id="gradeOffering" class="form-select"></select></div><div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadGradebookUI()">โหลด</button></div><div class="col-md-3"><button class="btn btn-outline-success w-100" onclick="regenRoomSheetsUI()">สร้างชีทรายห้อง</button></div></div></div>
  <div class="card p-3"><div class="table-responsive"><table class="table table-sm table-bordered" id="gradeTable"></table></div></div>
</section>
<section id="archive" class="section">
  <h3>Archive ภาคเรียน</h3>
  <div class="card p-3 danger-zone"><p>สร้างไฟล์ Archive แยกสำหรับภาคเรียนปัจจุบัน ก่อนเริ่มภาคเรียนใหม่</p><button class="btn btn-danger" onclick="archiveTermUI()">สร้าง Archive</button><pre id="archiveResult" class="mt-3"></pre></div>
</section>
<script>
async function randomBookUI(){return runUiAction('randomBookUI',async()=>{const sid=document.getElementById('scoreSession').value;const r=await call('api_randomBookCheck',sid,5);document.getElementById('scoreResult').innerHTML=(r.data||[]).map(x=>`<div class="border rounded p-2 mb-2">${escapeHtml(x.student_id)} <button class="btn btn-sm btn-success" onclick="saveBook('${escapeAttr(sid)}','${escapeAttr(x.student_id)}','BROUGHT')">นำสมุดมา</button> <button class="btn btn-sm btn-danger" onclick="saveBook('${escapeAttr(sid)}','${escapeAttr(x.student_id)}','NOT_BROUGHT')">ไม่ได้นำมา</button></div>`).join('')||'<div class="alert alert-info">ไม่พบรายชื่อสำหรับสุ่ม</div>';});}
async function saveBook(sid,studentId,result){return runUiAction('saveBook',async()=>{await call('api_saveBookCheckResult',{session_id:sid,student_id:studentId,result});toast('บันทึกตรวจสมุดแล้ว');});}
async function saveManualScoreUI(){return runUiAction('saveManualScoreUI',async()=>{await call('api_saveManualScore',{session_id:document.getElementById('scoreSession').value,student_id:document.getElementById('manualStudentId').value,score_title:document.getElementById('manualTitle').value,score_delta:document.getElementById('manualDelta').value});toast('บันทึกคะแนนแล้ว');});}
async function loadGradebookUI(){return runUiAction('loadGradebookUI',async()=>{const r=await call('api_getGradebook',{offering_id:document.getElementById('gradeOffering').value});const topics=r.data.topics||[];const rows=r.data.rows||[];document.getElementById('gradeTable').innerHTML='<thead><tr>'+['เลขที่','รหัส','ชื่อ','เข้าเรียน','สมุด','ส่งงาน','พิเศษ','รวม','ส่งแล้ว','ขาดส่ง','รอตรวจ','ยกเลิก'].concat(topics.map(t=>t.display_topic_name)).map(h=>`<th>${escapeHtml(h)}</th>`).join('')+'</tr></thead><tbody>'+rows.map(row=>'<tr>'+[row.student_no,row.student_id,row.student_name,row.attendance_score,row.book_score,row.submission_score,row.manual_score,row.total_score,row.submitted_count,row.missing_count,row.pending_review_count,row.voided_count].concat(topics.map(t=>row.topic_status[t.topic_id]||'-')).map(c=>`<td>${escapeHtml(c)}</td>`).join('')+'</tr>').join('')+'</tbody>';});}
async function regenRoomSheetsUI(){return runUiAction('regenRoomSheetsUI',async()=>{await call('api_regenerateRoomSheets');toast('สร้างชีทรายห้องแล้ว');});}
async function archiveTermUI(){return runUiAction('archiveTermUI',async()=>{const ok=await confirmAction('ยืนยันสร้าง Archive','ระบบจะสร้างไฟล์ Archive ภาคเรียนปัจจุบันและปรับสถานะภาคเรียน ยืนยันหรือไม่');if(!ok)return;const r=await call('api_createTermArchive','');document.getElementById('archiveResult').textContent=pretty(r.data);toast('สร้าง Archive แล้ว');});}
</script>
