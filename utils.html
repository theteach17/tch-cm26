<script>
const state={
  user:null,offerings:[],activeSessions:[],maxScanRetry:5,
  sessionDefaults:null,
  scan:{sessionId:'',idMap:{},rfidMap:{},present:{},pending:[],timer:null,retryCount:0},
  review:{offset:0,limit:30,rows:[],hasMore:false}
};
function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
function pretty(o){return JSON.stringify(o,null,2);}
function showLoading(v){const el=document.getElementById('loading');if(el)el.classList.toggle('show',!!v);}
function toast(msg,type='success'){const box=document.getElementById('toastArea');if(!box)return;const el=document.createElement('div');el.className=`alert alert-${type} shadow mb-2`;el.textContent=msg;box.appendChild(el);setTimeout(()=>el.remove(),4500);}
function escapeHtml(v){return String(v===undefined||v===null?'':v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#96;');}
function localDateValue(d=new Date()){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function updateClock(){const el=document.getElementById('heroClock');if(el)el.textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}setInterval(updateClock,10000);
function call(fn,...args){let options={};if(args.length&&typeof args[args.length-1]==='object'&&args[args.length-1]&&args[args.length-1].silentLoading!==undefined){options=args.pop();}if(!options.silentLoading)showLoading(true);return new Promise((resolve,reject)=>{google.script.run.withSuccessHandler(r=>{if(!options.silentLoading)showLoading(false);if(r&&r.ok===false){toast(r.message||'เกิดข้อผิดพลาด','danger');reject(r);}else resolve(r);}).withFailureHandler(e=>{if(!options.silentLoading)showLoading(false);toast(e&&e.message?e.message:String(e),'danger');reject(e);})[fn](...args);});}
async function runUiAction(name,fn){try{return await fn();}catch(e){console.error(name,e);return null;}}
async function confirmAction(title,message){return new Promise(resolve=>{resolve(window.confirm(title+'\n\n'+message));});}
function showSection(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));const sec=document.getElementById(id);if(sec)sec.classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===id));if(id==='dashboard')loadDashboard();if(id==='session'){ensureOfferingsLoadedUI();applySessionDefaultsUI();}if(id==='attendance'||id==='scores')loadActiveSessionsUI();}
function renderOfferingOption(o){return `<option value="${escapeAttr(o.offering_id)}">${escapeHtml(o.class_text||o.class_code)} · ${escapeHtml(o.course_code||'')} ${o.course_name?('· '+escapeHtml(o.course_name)):''}</option>`;}
function fillOfferingSelects(){
  const opts=state.offerings.map(renderOfferingOption).join('');
  ['sessionOffering','gradeOffering'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts||'<option value="">ไม่พบรายการห้อง/รายวิชา</option>';});
  const clsOpts='<option value="">ทุกห้อง</option>'+state.offerings.map(o=>`<option value="${escapeAttr(o.class_code)}">${escapeHtml(o.class_text||o.class_code)} · ${escapeHtml(o.course_code||'')}</option>`).join('');
  ['topicClass','reviewClass'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=clsOpts;});
  const warning=document.getElementById('sessionOfferingWarning');
  if(warning){
    warning.classList.toggle('d-none',state.offerings.length>0);
    if(!state.offerings.length)warning.innerHTML='<b>ยังไม่พบห้องเรียน/รายวิชา</b><br>ให้กดปุ่ม “ซ่อม/โหลดห้องเรียนใหม่” หรือไปหน้า ตั้งค่าระบบ > Initialize / Repair';
  }
}
async function ensureOfferingsLoadedUI(){return runUiAction('ensureOfferingsLoadedUI',async()=>{if(state.offerings&&state.offerings.length){fillOfferingSelects();return;}const r=await call('api_listOfferings');state.offerings=r.data||[];fillOfferingSelects();if(!state.offerings.length)toast('ไม่พบรายการห้องเรียน โปรดกด Initialize / Repair','warning');});}
function applySessionDefaultsFromData(d){
  if(!d)return;
  const dateEl=document.getElementById('sessionDate'); if(dateEl&&!dateEl.value)dateEl.value=d.date||localDateValue();
  const pEl=document.getElementById('periodNo'); if(pEl)pEl.value=d.period_no||'';
  const label=document.getElementById('periodSuggestionLabel'); if(label)label.textContent=d.period_label||'ไม่พบคาบตามเวลา';
  const detail=document.getElementById('periodSuggestionDetail'); if(detail)detail.textContent=`เวลาเครื่องระบบ: ${d.now||''} · สถานะ: ${d.state||''}`;
  const chips=document.getElementById('periodScheduleChips'); if(chips&&d.schedule){chips.innerHTML=d.schedule.map(p=>`<span class="period-chip me-1 mb-1">${p.period_no} · ${p.start}-${p.end}</span>`).join('');}
}
async function applySessionDefaultsUI(force=false){return runUiAction('applySessionDefaultsUI',async()=>{if(!force&&state.sessionDefaults){applySessionDefaultsFromData(state.sessionDefaults);return;}const r=await call('api_getSessionDefaults',{silentLoading:true});state.sessionDefaults=r.data;applySessionDefaultsFromData(r.data);});}
async function reloadOfferingsUI(){return runUiAction('reloadOfferingsUI',async()=>{const r=await call('api_listOfferings');state.offerings=r.data||[];fillOfferingSelects();toast(`โหลดห้องเรียนแล้ว ${state.offerings.length} รายการ`);});}
async function bootstrap(){return runUiAction('bootstrap',async()=>{updateClock();const r=await call('api_bootstrap');state.user=r.data.user;state.offerings=r.data.offerings||[];state.review.limit=Number(r.data.config.reviewPageSize||30);state.maxScanRetry=Number(r.data.config.maxScanRetry||5)||5;state.sessionDefaults=r.data.config.sessionDefaults||null;document.getElementById('userBox').innerHTML=`👤 ${escapeHtml(state.user.displayName)}<br>🛡️ ${escapeHtml(state.user.role)}<br><span class="text-white-50">ห้องที่มองเห็น: ${state.offerings.length}</span>`;fillOfferingSelects();applySessionDefaultsFromData(state.sessionDefaults);if(!state.offerings.length)toast('ไม่พบห้องเรียนในสิทธิ์ผู้ใช้/ภาคเรียนนี้','warning');await loadDashboard();await loadActiveSessionsUI();});}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>showSection(b.dataset.section)));bootstrap();const input=document.getElementById('scanInput');if(input){input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();handleScan(input.value);input.value='';}});}});
window.addEventListener('unhandledrejection',e=>{console.error('Unhandled rejection',e.reason);toast('เกิดข้อผิดพลาดที่ยังไม่ได้จัดการ กรุณาลองใหม่หรือติดต่อผู้ดูแลระบบ','danger');});
</script>
