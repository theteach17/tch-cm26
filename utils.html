<script>
const state={
  user:null,offerings:[],activeSessions:[],maxScanRetry:5,
  sessionDefaults:null,
  scan:{sessionId:'',idMap:{},rfidMap:{},present:{},pending:[],timer:null,retryCount:0,isFlushing:false,lastFlushAt:0},
  review:{offset:0,limit:30,rows:[],hasMore:false},
  random:{selected:[],payload:null,data:null},
  grouping:{data:null}
};
function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
function pretty(o){return JSON.stringify(o,null,2);}
let __loadingCount=0;
function showLoading(v){const el=document.getElementById('loading');if(!el)return;if(v){__loadingCount++;}else{__loadingCount=Math.max(0,__loadingCount-1);}el.classList.toggle('show',__loadingCount>0);}
function forceHideLoading(){__loadingCount=0;const el=document.getElementById('loading');if(el)el.classList.remove('show');}
function toast(msg,type='success'){const box=document.getElementById('toastArea');if(!box)return;const el=document.createElement('div');el.className=`app-toast app-toast-${type} shadow mb-2`;const icon=type==='danger'?'!':type==='warning'?'?':type==='info'?'i':'OK';el.innerHTML=`<div class="toast-icon">${icon}</div><div><b>${type==='danger'?'ไม่สามารถดำเนินการได้':type==='warning'?'โปรดตรวจสอบ':type==='info'?'แจ้งให้ทราบ':'ดำเนินการสำเร็จ'}</b><div>${escapeHtml(msg)}</div></div>`;box.appendChild(el);setTimeout(()=>el.remove(),5200);}
function escapeHtml(v){return String(v===undefined||v===null?'':v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#96;');}
function friendlyErrorMessage(e){const raw=(e&&e.message)||String(e||'');if(/UrlFetchApp|external_request|authorization/i.test(raw))return 'ระบบกำลังใช้ลิงก์สำรองสำหรับรูปภาพ หากต้องการใช้ proxy รูปภาพ ให้ผู้ดูแลระบบกด Deploy เวอร์ชันใหม่และอนุญาตสิทธิ์อีกครั้ง';if(/Lock|SERVER_BUSY|busy/i.test(raw))return 'ระบบกำลังบันทึกข้อมูลชุดก่อนหน้า กรุณารอสักครู่ ระบบจะลองใหม่ให้อัตโนมัติ';if(/permission|Authorization|access/i.test(raw))return 'บัญชีนี้ยังไม่มีสิทธิ์ดำเนินการ หรือระบบยังไม่ได้รับอนุญาตสิทธิ์ล่าสุด';return raw;}

function formatThaiDateDisplay(iso){
  if(!iso)return '';
  const parts=String(iso).slice(0,10).split('-');
  if(parts.length!==3)return iso;
  const y=Number(parts[0]),m=Number(parts[1]),d=Number(parts[2]);
  const months=['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return `${d} ${months[m]||''} ${y+543}`;
}

function localDateValue(d=new Date()){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function updateClock(){const el=document.getElementById('heroClock');if(el)el.textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}setInterval(updateClock,10000);
function call(fn,...args){let options={};if(args.length&&typeof args[args.length-1]==='object'&&args[args.length-1]&&(args[args.length-1].silentLoading!==undefined||args[args.length-1].silentError!==undefined||args[args.length-1].timeoutMs!==undefined)){options=args.pop();}if(!options.silentLoading)showLoading(true);return new Promise((resolve,reject)=>{let settled=false;const done=()=>{if(!options.silentLoading)showLoading(false);};let timer=null;if(options.timeoutMs){timer=setTimeout(()=>{if(settled)return;settled=true;done();const err={message:'REQUEST_TIMEOUT: '+fn+' ใช้เวลานานเกินกำหนด ระบบจะปล่อยหน้าเว็บให้ใช้งานต่อได้'};if(!options.silentError)toast('คำขอนี้ใช้เวลานานเกินไป กรุณาลองใหม่อีกครั้งหรือรีเฟรชหน้าเว็บ','warning');reject(err);},Number(options.timeoutMs));}google.script.run.withSuccessHandler(r=>{if(settled)return;settled=true;if(timer)clearTimeout(timer);done();if(r&&r.ok===false){if(!options.silentError)toast(r.message||'เกิดข้อผิดพลาด','danger');reject(r);}else resolve(r);}).withFailureHandler(e=>{if(settled)return;settled=true;if(timer)clearTimeout(timer);done();if(!options.silentError)toast(friendlyErrorMessage(e),'danger');reject(e);})[fn](...args);});}
async function runUiAction(name,fn){try{return await fn();}catch(e){console.error(name,e);return null;}}
async function confirmAction(title,message){return new Promise(resolve=>{resolve(window.confirm(title+'\n\n'+message));});}
function showSection(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));const sec=document.getElementById(id);if(sec)sec.classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===id));if(id==='dashboard')renderDashboardIdle_();if(id==='session'){ensureOfferingsLoadedUI();applySessionDefaultsUI();}if(id==='attendance')loadActiveSessionsUI({autoBootstrap:true});if(id==='scores')loadActiveSessionsUI({autoBootstrap:false});if(id==='randomName'){ensureOfferingsLoadedUI();loadActiveSessionsUI({autoBootstrap:false});setTimeout(()=>{if(document.getElementById('randomOffering')&&document.getElementById('randomOffering').value)loadRandomSessionsUI();},200);}if(id==='grouping'){ensureOfferingsLoadedUI();loadActiveSessionsUI({autoBootstrap:false});setTimeout(()=>{if(document.getElementById('groupOffering')&&document.getElementById('groupOffering').value)loadGroupSessionsUI();},200);}if(id==='attendanceReport'){ensureOfferingsLoadedUI();}if(id==='review'){ensureOfferingsLoadedUI();if(document.getElementById('reviewClass')&&document.getElementById('reviewClass').value)loadReviewTopicsUI();}}
function renderOfferingOption(o){return `<option value="${escapeAttr(o.offering_id)}">${escapeHtml(o.class_text||o.class_code)} · ${escapeHtml(o.course_code||'')} ${o.course_name?('· '+escapeHtml(o.course_name)):''}</option>`;}
function fillOfferingSelects(){
  state.offerings = Array.isArray(state.offerings) ? state.offerings : [];
  const opts=state.offerings.map(renderOfferingOption).join('');
  ['sessionOffering','gradeOffering','attendanceOffering','randomOffering','groupOffering'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts?('<option value="">— เลือกห้อง/รายวิชา —</option>'+opts):'<option value="">ไม่พบรายการห้อง/รายวิชา</option>';});
  const clsOpts='<option value="">ทุกห้อง</option>'+state.offerings.map(o=>`<option value="${escapeAttr(o.class_code)}">${escapeHtml(o.class_text||o.class_code)} · ${escapeHtml(o.course_code||'')}</option>`).join('');
  ['topicClass','reviewClass'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=clsOpts;});
  const warning=document.getElementById('sessionOfferingWarning');
  if(warning){
    warning.classList.toggle('d-none',state.offerings.length>0);
    if(!state.offerings.length)warning.innerHTML='<b>ยังไม่พบห้องเรียน/รายวิชาในหน้าเว็บ</b><br>จากข้อมูลจริงอาจมีห้องอยู่แล้ว แต่ API โหลดไม่ได้ ให้กด “วิเคราะห์ปัญหา” เพื่อดู email, role, activeTerm และจำนวน CourseOfferings ที่ server อ่านได้';
  }
}
function normalizeOfferingsResponse_(r){
  if(!r||!r.data)return [];
  if(Array.isArray(r.data))return r.data;
  if(Array.isArray(r.data.offerings))return r.data.offerings;
  return [];
}
async function diagnoseStartupUI(targetId='sessionResult'){
  return runUiAction('diagnoseStartupUI',async()=>{
    const r=await call('api_diagnoseStartup');
    const box=document.getElementById(targetId)||document.getElementById('sessionResult');
    if(box)box.innerHTML=`<div class="alert alert-info"><b>ผลวิเคราะห์ Startup</b><pre class="mb-0 small">${escapeHtml(JSON.stringify(r.data,null,2))}</pre></div>`;
    return r.data;
  });
}
async function ensureOfferingsLoadedUI(){return runUiAction('ensureOfferingsLoadedUI',async()=>{if(state.offerings&&state.offerings.length){fillOfferingSelects();return;}const r=await call('api_listOfferings');state.offerings=normalizeOfferingsResponse_(r);fillOfferingSelects();if(!state.offerings.length){toast('ไม่พบรายการห้องเรียนใน API กำลังแสดงผลวิเคราะห์','warning');await diagnoseStartupUI('sessionResult');}});}

function applySessionDefaultsFromData(d){
  if(!d)return;
  const isoDate=d.date||localDateValue();
  const dateEl=document.getElementById('sessionDate'); if(dateEl)dateEl.value=isoDate;
  const thaiEl=document.getElementById('sessionDateThai'); if(thaiEl)thaiEl.textContent=formatThaiDateDisplay(isoDate);
  const isoText=document.getElementById('sessionDateIsoText'); if(isoText)isoText.textContent='ระบบจะบันทึกเป็น '+isoDate;
  const pEl=document.getElementById('periodNo'); if(pEl)pEl.value=d.period_no||'';
  const label=document.getElementById('periodSuggestionLabel'); if(label)label.textContent=d.period_label||'ไม่พบคาบตามเวลา';
  const detail=document.getElementById('periodSuggestionDetail'); if(detail)detail.textContent=`เวลาเครื่องระบบ: ${d.now||''} · สถานะ: ${d.state||''}`;
  const chips=document.getElementById('periodScheduleChips'); if(chips&&d.schedule){chips.innerHTML=d.schedule.map(p=>`<span class="period-chip me-1 mb-1">${p.period_no} · ${p.start}-${p.end}</span>`).join('');}
}
async function applySessionDefaultsUI(force=false){return runUiAction('applySessionDefaultsUI',async()=>{if(!force&&state.sessionDefaults){applySessionDefaultsFromData(state.sessionDefaults);return;}const r=await call('api_getSessionDefaults',{silentLoading:true});state.sessionDefaults=r.data;applySessionDefaultsFromData(r.data);});}
async function reloadOfferingsUI(){return runUiAction('reloadOfferingsUI',async()=>{const r=await call('api_listOfferings');state.offerings=normalizeOfferingsResponse_(r);fillOfferingSelects();toast(`โหลดห้องเรียนแล้ว ${state.offerings.length} รายการ`);if(!state.offerings.length)await diagnoseStartupUI('sessionResult');});}

function renderDashboardIdle_(){
  const cards=document.getElementById('dashCards');
  const activeBox=document.getElementById('activeSessions');
  if(cards && !cards.dataset.loaded){
    cards.innerHTML=`<div class="col-12"><div class="dashboard-idle-box"><div><b>แดชบอร์ดพร้อมใช้งาน</b><br><span>เพื่อให้เปิดระบบได้เร็ว ระบบจะไม่โหลดตัวเลขหนักอัตโนมัติ</span></div><button class="btn btn-primary" onclick="loadDashboard({silentLoading:false,force:true})">โหลดภาพรวม</button></div></div>`;
  }
  if(activeBox && !activeBox.innerHTML.trim()) activeBox.innerHTML='<div class="text-muted">กด “โหลดภาพรวม” เพื่อดูคาบที่กำลังเปิด</div>';
}

async function bootstrap(){return runUiAction('bootstrap',async()=>{updateClock();let r=null;try{r=await call('api_bootstrap');}catch(e){document.getElementById('userBox').innerHTML='Bootstrap failed<br><span class="text-white-50">เปิดหน้าตั้งค่า/วิเคราะห์ปัญหา</span>';await diagnoseStartupUI('dashCards');return;}state.user=(r.data&&r.data.user)||{displayName:'unknown',role:'VIEWER'};state.offerings=normalizeOfferingsResponse_(r);state.review.limit=Number((r.data&&r.data.config&&r.data.config.reviewPageSize)||30);state.maxScanRetry=Number((r.data&&r.data.config&&r.data.config.maxScanRetry)||5)||5;state.sessionDefaults=(r.data&&r.data.config&&r.data.config.sessionDefaults)||null;const diag=(r.data&&r.data.diagnostics)||{};document.getElementById('userBox').innerHTML=`👤 ${escapeHtml(state.user.displayName||state.user.email)}<br>🛡️ ${escapeHtml(state.user.role)}<br><span class="text-white-50">ห้องที่มองเห็น: ${state.offerings.length}</span>`;fillOfferingSelects();applySessionDefaultsFromData(state.sessionDefaults);if(diag.errors&&diag.errors.length){toast('Bootstrap มี warning/error กรุณาดูผลวิเคราะห์','warning');console.warn('bootstrap diagnostics',diag);}if(!state.offerings.length){toast('ไม่พบห้องเรียนในหน้าเว็บ กำลังลองโหลด fallback','warning');await ensureOfferingsLoadedUI();}
  // Keep startup responsive. Dashboard counters are loaded only when the teacher requests them.
  renderDashboardIdle_();
  loadActiveSessionsUI({autoBootstrap:false});
});}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>showSection(b.dataset.section)));bootstrap();const input=document.getElementById('scanInput');if(input){input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();handleScan(input.value);input.value='';}});}});
window.addEventListener('unhandledrejection',e=>{console.error('Unhandled rejection',e.reason);toast('เกิดข้อผิดพลาดที่ยังไม่ได้จัดการ กรุณาลองใหม่หรือติดต่อผู้ดูแลระบบ','danger');});
</script>
