<script>
const state={user:null,offerings:[],activeSessions:[],maxScanRetry:5,scan:{sessionId:'',idMap:{},rfidMap:{},present:{},pending:[],timer:null,retryCount:0},review:{offset:0,limit:30,rows:[],hasMore:false}};
function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
function pretty(o){return JSON.stringify(o,null,2);}
function showLoading(v){const el=document.getElementById('loading');if(el)el.classList.toggle('show',!!v);}
function toast(msg,type='success'){const box=document.getElementById('toastArea');const el=document.createElement('div');el.className=`alert alert-${type} shadow mb-2`;el.textContent=msg;box.appendChild(el);setTimeout(()=>el.remove(),4200);}
function escapeHtml(v){return String(v===undefined||v===null?'':v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#96;');}
function call(fn,...args){let options={};if(args.length&&typeof args[args.length-1]==='object'&&args[args.length-1]&&args[args.length-1].silentLoading!==undefined){options=args.pop();}if(!options.silentLoading)showLoading(true);return new Promise((resolve,reject)=>{google.script.run.withSuccessHandler(r=>{if(!options.silentLoading)showLoading(false);if(r&&r.ok===false){toast(r.message||'เกิดข้อผิดพลาด','danger');reject(r);}else resolve(r);}).withFailureHandler(e=>{if(!options.silentLoading)showLoading(false);toast(e&&e.message?e.message:String(e),'danger');reject(e);})[fn](...args);});}
async function runUiAction(name,fn){try{return await fn();}catch(e){console.error(name,e);return null;}}
async function confirmAction(title,message){return new Promise(resolve=>{resolve(window.confirm(title+'\n\n'+message));});}
function showSection(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===id));if(id==='dashboard')loadDashboard();if(id==='session'||id==='attendance'||id==='scores')loadActiveSessionsUI();}
function fillOfferingSelects(){const opts=state.offerings.map(o=>`<option value="${escapeAttr(o.offering_id)}">${escapeHtml(o.class_text||o.class_code)} | ${escapeHtml(o.course_code)}</option>`).join('');['sessionOffering','gradeOffering'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts;});const clsOpts='<option value="">ทุกห้อง</option>'+state.offerings.map(o=>`<option value="${escapeAttr(o.class_code)}">${escapeHtml(o.class_text||o.class_code)}</option>`).join('');['topicClass','reviewClass'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=clsOpts;});}
async function bootstrap(){return runUiAction('bootstrap',async()=>{document.getElementById('sessionDate').value=new Date().toISOString().slice(0,10);const r=await call('api_bootstrap');state.user=r.data.user;state.offerings=r.data.offerings||[];state.review.limit=Number(r.data.config.reviewPageSize||30);state.maxScanRetry=Number(r.data.config.maxScanRetry||5)||5;document.getElementById('userBox').innerHTML=`${escapeHtml(state.user.displayName)}<br>${escapeHtml(state.user.role)}`;fillOfferingSelects();await loadDashboard();await loadActiveSessionsUI();});}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>showSection(b.dataset.section)));bootstrap();const input=document.getElementById('scanInput');if(input){input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();handleScan(input.value);input.value='';}});}});
window.addEventListener('unhandledrejection',e=>{console.error('Unhandled rejection',e.reason);toast('เกิดข้อผิดพลาดที่ยังไม่ได้จัดการ กรุณาลองใหม่หรือติดต่อผู้ดูแลระบบ','danger');});
</script>
